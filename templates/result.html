<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prediction Result</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .card {
      background: #1e293b;
      padding: 32px;
      border-radius: 16px;
      max-width: 500px;
      width: 90%;
      text-align: center;
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }

    h1 {
      margin-bottom: 16px;
      font-size: 2rem;
    }

    .risk {
      font-size: 1.4rem;
      font-weight: bold;
      margin: 16px 0;
    }

    .high {
      color: #ef4444;
    }

    .low {
      color: #22c55e;
    }

    .confidence {
      margin-top: 12px;
      font-size: 1rem;
      color: #cbd5e1;
    }

    a {
      display: inline-block;
      margin-top: 24px;
      padding: 12px 20px;
      background: #3b82f6;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    a:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Heart Disease Prediction</h1>

    <p class="risk {% if risk == 'high' %}high{% else %}low{% endif %}">
      {{ prediction_text }}
    </p>

    {% if confidence is not none %}
      <p class="confidence">Confidence: {{ confidence }}%</p>
    {% endif %}

    <a href="/">Go Back</a>
  </div>
</body>
</html>
